<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sin conexión · La Canchita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      background: #0d0d0d; color: #fff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 360px; }
    .logo { font-size: 26px; font-weight: 800; color: #4cd964; letter-spacing: -.5px; margin-bottom: 28px; }
    .ico {
      width: 96px; height: 96px; margin: 0 auto 24px; border-radius: 50%;
      background: #16161f; display: flex; align-items: center; justify-content: center;
      font-size: 44px; border: 1px solid rgba(255,255,255,.08);
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,.55); line-height: 1.6; margin-bottom: 28px; }
    button {
      background: #4cd964; color: #0d0d0d; border: 0; border-radius: 12px;
      padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
      width: 100%; transition: opacity .2s;
    }
    button:active { opacity: .8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">La Canchita</div>
    <div class="ico">📡</div>
    <h1>Sin conexión</h1>
    <p>No pudimos conectarnos. Revisá tu conexión a internet e intentá de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
  <script>
    // Reintenta automáticamente cuando vuelve la conexión.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
